import org.gradle.api.flow.FlowAction
import org.gradle.api.flow.FlowParameters
import org.gradle.api.flow.FlowProviders
import org.gradle.api.flow.FlowScope
import org.gradle.api.provider.Property
import org.gradle.api.tasks.Input
import org.gradle.api.services.BuildService
import org.gradle.api.services.BuildServiceParameters
import org.gradle.build.event.BuildEventsListenerRegistry
import org.gradle.tooling.events.FinishEvent
import org.gradle.tooling.events.OperationCompletionListener
import org.gradle.tooling.events.task.TaskFailureResult
import org.gradle.tooling.events.task.TaskFinishEvent
import org.gradle.tooling.events.task.TaskSkippedResult

class McpBuildRecorderSupport {

    private static final java.util.concurrent.ConcurrentHashMap<String, Object> APPEND_EVENT_LOCKS =
        new java.util.concurrent.ConcurrentHashMap<>()
    static String resolveBuildId(String preferred, Map existing) {
        def id = preferred?.trim()
        if (id) {
            return id
        }
        def existingId = existing?.buildId
        if (existingId instanceof String && existingId.trim()) {
            return existingId.trim()
        }
        return null
    }

    static Map readGradleResult(String dirPath) {
        def file = new File(dirPath, "gradle-result.json")
        if (!file.isFile()) {
            return [:]
        }
        try {
            return new groovy.json.JsonSlurper().parse(file) as Map
        } catch (ignored) {
            return [:]
        }
    }

    static void writeGradleResult(String dirPath, Map data) {
        def target = new File(dirPath, "gradle-result.json")
        def tmp = new File(dirPath, "gradle-result.json.tmp")
        def json = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(data))
        tmp.withWriter('UTF-8') { writer -> writer.write(json) }
        if (!tmp.renameTo(target)) {
            target.withWriter('UTF-8') { writer -> writer.write(json) }
            tmp.delete()
        }
    }

    static void appendEvent(String dirPath, Map event) {
        def line = groovy.json.JsonOutput.toJson(event) + "\n"
        def lock = APPEND_EVENT_LOCKS.computeIfAbsent(dirPath, { new Object() })
        synchronized(lock) {
            def events = new File(dirPath, "events.ndjson")
            events.withWriterAppend('UTF-8') { writer ->
                writer.write(line)
            }
        }
    }

    static void releaseAppendEventLock(String dirPath) {
        APPEND_EVENT_LOCKS.remove(dirPath)
    }

    /** First Tooling API failure message; mirrors Kotlin BuildProgressTracker.firstOrNull fallback. */
    static String firstFailureMessage(def failures, String fallback = "failed") {
        failures?.head()?.message ?: fallback
    }

    static void writeTerminalGradleResult(
            String dirPath,
            String preferredBuildId,
            String status,
            String failureMessage = null) {
        def existing = readGradleResult(dirPath)
        def payload = [
            schemaVersion: 1,
            buildId      : resolveBuildId(preferredBuildId, existing),
            status       : status,
            finishedAt   : java.time.Instant.now().toString(),
            failure      : failureMessage,
        ]
        if (existing.startedAt != null) {
            payload.startedAt = existing.startedAt
        }
        if (existing.taskNames != null) {
            payload.taskNames = existing.taskNames
        }
        writeGradleResult(dirPath, payload)
        appendEvent(dirPath, [
            ts    : java.time.Instant.now().toString(),
            type  : "BUILD_FINISHED",
            status: status,
        ])
    }

    static String terminalStatus(boolean hasFailure, String failureClassName, String failureMessage) {
        if (!hasFailure) {
            return "succeeded"
        }
        return terminalStatusFromFailure(failureClassName, failureMessage)
    }

    static void appendHeartbeatEvent(String dirPath) {
        appendEvent(dirPath, [
            ts          : java.time.Instant.now().toString(),
            type        : "HEARTBEAT",
            displayName : "Gradle build active",
        ])
    }

    static String terminalStatusFromFailure(String failureClassName, String failureMessage) {
        if (failureClassName?.contains("BuildCancelled") ||
            failureClassName?.contains("CancellationException") ||
            (failureMessage?.toLowerCase()?.contains("cancel") ?: false)) {
            return "cancelled"
        }
        return "failed"
    }

    static Map readLauncherMetadata(String metadataPath, File projectDirectory) {
        def parsed = new groovy.json.JsonSlurper().parse(new File(metadataPath))
        def buildId = (parsed.buildId as String)?.trim()
        def recordDir = new File(parsed.recordDir as String).absoluteFile
        if (!McpBuildRecorderSupport.isSafeRecordDir(projectDirectory, buildId, recordDir)) {
            throw new IllegalStateException(
                "Invalid MCP recordDir for build ${buildId ?: '<missing>'}: path must be under " +
                    ".gradle/mcp-builds/<buildId> in the project directory."
            )
        }
        recordDir.mkdirs()
        return [
            recordDirPath: recordDir.absolutePath,
            buildId      : buildId,
        ]
    }

    static File projectDirectoryFromMetadataPath(String metadataPath) {
        def metadataFile = new File(metadataPath).canonicalFile
        def launcherDir = metadataFile.parentFile
        def recordsRoot = launcherDir?.parentFile
        def gradleDir = recordsRoot?.parentFile
        return gradleDir?.parentFile
    }

    static boolean isSafeRecordDir(File projectDirectory, String buildId, File recordDir) {
        if (!projectDirectory || !buildId || buildId == '.' || buildId == '..' ||
            buildId.contains('/') || buildId.contains('\\') || buildId.contains('..')) {
            return false
        }
        def recordsRoot = new File(projectDirectory, ".gradle/mcp-builds").canonicalFile
        def expected = new File(recordsRoot, buildId).canonicalFile
        def canonicalRecordDir = recordDir.canonicalFile
        return canonicalRecordDir == expected && canonicalRecordDir.toPath().startsWith(recordsRoot.toPath())
    }
}

abstract class McpConfigurationCacheRecorderService
        implements BuildService<McpConfigurationCacheRecorderService.Params>, OperationCompletionListener, AutoCloseable {

    interface Params extends BuildServiceParameters {
        Property<String> getLauncherMetadataPath()
    }

    private static final long HEARTBEAT_INTERVAL_MS = 15_000L

    private java.util.Timer heartbeatTimer

    private Map launcherContext() {
        def metadataPath = parameters.launcherMetadataPath.get()
        McpBuildRecorderSupport.readLauncherMetadata(
            metadataPath,
            McpBuildRecorderSupport.projectDirectoryFromMetadataPath(metadataPath),
        )
    }

    private void appendEvent(Map event) {
        appendEvent(launcherContext().recordDirPath, event)
    }

    void startHeartbeatIfNeeded() {
        if (heartbeatTimer != null) {
            return
        }
        def recordDirPath = launcherContext().recordDirPath
        heartbeatTimer = new java.util.Timer(true)
        heartbeatTimer.scheduleAtFixedRate(
            { -> McpBuildRecorderSupport.appendHeartbeatEvent(recordDirPath) } as java.util.TimerTask,
            HEARTBEAT_INTERVAL_MS,
            HEARTBEAT_INTERVAL_MS,
        )
    }

    @Override
    void onFinish(FinishEvent event) {
        if (!(event instanceof TaskFinishEvent)) {
            return
        }
        startHeartbeatIfNeeded()
        TaskFinishEvent finish = (TaskFinishEvent) event
        def result = finish.result
        def type = "TASK_SUCCESS"
        def outcome = null
        if (result instanceof TaskFailureResult) {
            type = "TASK_FAIL"
            // Gradle 9.6+: TaskFailureResult.failure removed; use failures collection.
            outcome = McpBuildRecorderSupport.firstFailureMessage(result.failures)
        } else if (result instanceof TaskSkippedResult) {
            type = "TASK_SKIP"
        }
        appendEvent([
            ts          : java.time.Instant.now().toString(),
            type        : type,
            displayName : finish.descriptor.taskPath,
            outcome     : outcome,
        ])
    }

    @Override
    void close() {
        if (heartbeatTimer != null) {
            heartbeatTimer.cancel()
            heartbeatTimer = null
        }
    }
}

abstract class McpBuildFinalizeFlowAction implements FlowAction<McpBuildFinalizeFlowAction.Params> {

    interface Params extends FlowParameters {
        @Input
        Property<String> getLauncherMetadataPath()

        @Input
        Property<Boolean> getBuildFailed()

        @Input
        Property<String> getFailureClassName()

        @Input
        Property<String> getFailureMessage()
    }

    @Override
    void execute(Params parameters) {
        def metadataPath = parameters.launcherMetadataPath.get()
        def context = McpBuildRecorderSupport.readLauncherMetadata(
            metadataPath,
            McpBuildRecorderSupport.projectDirectoryFromMetadataPath(metadataPath),
        )
        def failureMessage = parameters.failureMessage.getOrNull()
        if (failureMessage != null && failureMessage.isEmpty()) {
            failureMessage = null
        }
        def status = McpBuildRecorderSupport.terminalStatus(
            parameters.buildFailed.get(),
            parameters.failureClassName.getOrNull(),
            failureMessage,
        )
        McpBuildRecorderSupport.writeTerminalGradleResult(
            context.recordDirPath,
            context.buildId,
            status,
            failureMessage,
        )
        McpBuildRecorderSupport.releaseAppendEventLock(context.recordDirPath)
    }
}

gradle.projectsLoaded {
    def listenerProvider = gradle.sharedServices.registerIfAbsent(
        "mcpConfigurationCacheRecorder",
        McpConfigurationCacheRecorderService,
    ) { spec ->
        spec.parameters.launcherMetadataPath.set(gradle.ext.mcpLauncherMetadataPath)
    }
    gradle.services.get(BuildEventsListenerRegistry).onTaskCompletion(listenerProvider)
    listenerProvider.get().startHeartbeatIfNeeded()

    def flowScope = gradle.services.get(FlowScope)
    def flowProviders = gradle.services.get(FlowProviders)
    flowScope.always(McpBuildFinalizeFlowAction) { spec ->
        spec.parameters.launcherMetadataPath.set(gradle.ext.mcpLauncherMetadataPath)
        spec.parameters.buildFailed.set(
            flowProviders.buildWorkResult.map { it.failure.present },
        )
        spec.parameters.failureClassName.set(
            flowProviders.buildWorkResult.map { result ->
                result.failure.map { failure -> failure.class.name }.orElse("")
            },
        )
        spec.parameters.failureMessage.set(
            flowProviders.buildWorkResult.map { result ->
                result.failure.map { failure -> failure.message }.orElse("")
            },
        )
    }
}
